<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: deep navy -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E27"/>
      <stop offset="100%" stop-color="#111536"/>
    </linearGradient>

    <!-- Neon border gradient: cyan to purple -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>

    <!-- Subtle radial sheen behind the letters -->
    <radialGradient id="sheen" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#2A3363" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0A0E27" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft glow for the border -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gentle glow just for the letters, kept small so it never reduces crispness -->
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bgGrad)"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#sheen)"/>

  <!-- Glowing gradient border (blurred layer behind for soft neon glow) -->
  <g filter="url(#glow)" opacity="0.4">
    <rect x="20" y="20" width="472" height="472" rx="108" fill="none" stroke="url(#borderGrad)" stroke-width="7"/>
  </g>

  <!-- Crisp gradient border on top -->
  <rect x="20" y="20" width="472" height="472" rx="108" fill="none" stroke="url(#borderGrad)" stroke-width="6"/>

  <!-- Initials (no blur filter here — crispness at 16px matters more than glow) -->
  <text x="256" y="344"
        font-family="Poppins, Arial, sans-serif"
        font-weight="700"
        font-size="272"
        letter-spacing="-6"
        text-anchor="middle"
        fill="#FFFFFF">BL</text>
</svg>
